<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diabetic Foot Registry</title>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #fafafa;
    --fg: #0a0a0a;
    --card: #ffffff;
    --border: #e5e7eb;
    --muted: #6b7280;
    --danger: #dc2626;
  }
  html.dark {
    --bg: #0a0a0a;
    --fg: #f5f5f5;
    --card: #141414;
    --border: #262626;
    --muted: #9ca3af;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    min-height: 100vh;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea {
    font-family: inherit;
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--fg);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--fg); }
  textarea { resize: vertical; min-height: 80px; }
  label.lbl {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 4px 16px rgba(0,0,0,0.03);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .btn-primary { background: var(--fg); color: var(--bg); }
  .btn-primary:hover:not(:disabled) { opacity: 0.88; }
  .btn-ghost { background: transparent; color: var(--fg); border-color: var(--border); }
  .btn-ghost:hover:not(:disabled) { background: var(--border); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }

  /* Layout */
  #app { min-height: 100vh; }
  .layout { display: flex; min-height: 100vh; }
  aside.sidebar {
    width: 240px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--card);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .brand { padding: 0 8px 24px; }
  .brand-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .brand-sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  nav.nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.15s;
    text-align: left;
    width: 100%;
  }
  .nav-item:hover { background: var(--border); }
  .nav-item.active { background: var(--fg); color: var(--bg); font-weight: 500; }
  .sidebar-footer { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; display: flex; flex-direction: column; gap: 2px; }
  .sidebar-footer .email { padding: 6px 12px; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; }

  main.main { flex: 1; padding: 40px; max-width: 100%; overflow-x: auto; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  .page-title { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
  .page-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* Stats grid */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat { padding: 18px; display: flex; align-items: flex-start; justify-content: space-between; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .stat-value { font-size: 26px; font-weight: 600; margin-top: 8px; font-variant-numeric: tabular-nums; }
  .stat-icon { color: var(--muted); }

  /* Search bar */
  .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; max-width: 360px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .search-wrap input { padding-left: 36px; }
  .tabs { display: inline-flex; border: 1px solid var(--border); border-radius: 10px; padding: 3px; background: var(--card); }
  .tab { padding: 6px 14px; font-size: 12px; border-radius: 7px; color: var(--fg); transition: all 0.15s; }
  .tab.active { background: var(--fg); color: var(--bg); }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 1px solid var(--border); }
  th { text-align: left; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); padding: 14px 20px; }
  td { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: rgba(128,128,128,0.04); }
  .row-link { font-weight: 500; }
  .row-link:hover { text-decoration: underline; }
  .muted { color: var(--muted); }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; padding: 3px 10px; border-radius: 999px;
    border: 1px solid var(--border);
  }
  .badge-active { border-color: var(--fg); }
  .badge .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--muted); }
  .badge-active .dot { background: var(--fg); }

  .empty { padding: 48px 20px; text-align: center; color: var(--muted); font-size: 13px; }

  .desk-only { display: table-cell; }
  .mobile-only { display: none; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .modal {
    width: 100%; max-width: 520px; padding: 28px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 17px; font-weight: 600; margin: 0; }
  .modal-close { padding: 6px; border-radius: 6px; color: var(--muted); }
  .modal-close:hover { background: var(--border); color: var(--fg); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-row { margin-bottom: 14px; }
  .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .error-msg { color: var(--danger); font-size: 12px; margin-top: 8px; }

  /* Patient detail */
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .back-link:hover { color: var(--fg); }
  .patient-head { padding: 24px; margin-bottom: 18px; }
  .patient-head-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
  .patient-name { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 4px; }
  .patient-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 16px 24px; margin-top: 14px; }
  .meta-item .lbl-text { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .meta-item .val { font-size: 13px; margin-top: 2px; }
  .patient-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .proc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  @media (max-width: 640px) { .proc-grid { grid-template-columns: 1fr; } }
  .proc-card { padding: 20px; }
  .proc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .proc-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
  .proc-count { font-size: 30px; font-weight: 600; font-variant-numeric: tabular-nums; margin-bottom: 4px; }
  .proc-last { font-size: 11px; color: var(--muted); }

  .section { padding: 24px; margin-bottom: 18px; }
  .section-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; margin: 0 0 18px; }

  /* Timeline */
  .timeline { position: relative; padding-left: 20px; border-left: 1px solid var(--border); margin-left: 6px; }
  .timeline-item { position: relative; padding-bottom: 24px; }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-dot { position: absolute; left: -26px; top: 4px; width: 10px; height: 10px; border-radius: 999px; background: var(--fg); }
  .timeline-header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .timeline-op { font-size: 13px; font-weight: 500; }
  .timeline-date { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .timeline-notes { font-size: 13px; margin-top: 6px; white-space: pre-wrap; line-height: 1.5; }

  /* Image gallery */
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-top: 12px; }
  .gallery-item {
    aspect-ratio: 1; border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border); cursor: pointer;
    transition: opacity 0.15s; padding: 0;
  }
  .gallery-item:hover { opacity: 0.85; }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .lightbox img { max-width: 100%; max-height: 85vh; border-radius: 10px; object-fit: contain; }
  .lightbox-close { position: absolute; top: 20px; right: 20px; padding: 10px; color: white; background: rgba(255,255,255,0.1); border-radius: 8px; }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }
  .lightbox-label { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-size: 13px; }

  /* File drop */
  .file-drop {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 18px; border: 1px dashed var(--border); border-radius: 10px;
    cursor: pointer; color: var(--muted); font-size: 13px;
    transition: background 0.15s;
  }
  .file-drop:hover { background: rgba(128,128,128,0.04); }
  .file-drop input { display: none; }

  /* Login */
  .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card { width: 100%; max-width: 380px; padding: 32px; }
  .login-header { margin-bottom: 22px; }
  .login-title { font-size: 15px; font-weight: 600; margin: 0; }
  .login-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .login-switch { background: none; border: none; color: var(--muted); font-size: 12px; margin-top: 14px; width: 100%; text-align: center; padding: 4px; }
  .login-switch:hover { color: var(--fg); }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 18px; border-radius: 10px; background: var(--fg); color: var(--bg); font-size: 13px; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
  .toast.error { background: var(--danger); color: white; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid currentColor; border-right-color: transparent;
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .config-warning {
    max-width: 640px; margin: 80px auto; padding: 32px;
    border: 1px solid var(--danger); border-radius: 14px; background: var(--card);
  }
  .config-warning h1 { font-size: 18px; margin: 0 0 12px; color: var(--danger); }
  .config-warning code { background: var(--border); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .config-warning pre { background: var(--border); padding: 14px; border-radius: 8px; overflow-x: auto; font-size: 12px; }

  /* ============================================================ */
  /* Bottom navigation (mobile only) */
  /* ============================================================ */
  .bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    z-index: 50;
    padding: 8px 4px calc(8px + env(safe-area-inset-bottom, 0px));
    justify-content: space-around;
    align-items: stretch;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }
  .bnav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 6px 4px;
    border-radius: 10px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 500;
    transition: all 0.15s;
    min-width: 0;
  }
  .bnav-item:hover:not(:disabled) { background: rgba(128,128,128,0.06); }
  .bnav-item.active { color: var(--fg); }
  .bnav-item.active svg { stroke: var(--fg); }
  .bnav-item:disabled { opacity: 0.35; cursor: not-allowed; }
  .bnav-item svg { width: 20px; height: 20px; }
  .bnav-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .bnav-item.primary {
    color: var(--fg);
  }
  .bnav-item.primary .bnav-icon-wrap {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--fg); color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1px;
    transition: transform 0.15s;
  }
  .bnav-item.primary:hover:not(:disabled) .bnav-icon-wrap { transform: scale(1.05); }
  .bnav-item.primary svg { stroke: var(--bg); width: 18px; height: 18px; }
  .bnav-item.primary:disabled .bnav-icon-wrap { background: var(--muted); }

  /* ============================================================ */
  /* Responsive: tablet and below */
  /* ============================================================ */
  @media (max-width: 900px) {
    main.main { padding: 24px; }
    .page-title { font-size: 20px; }
    .stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat { padding: 14px; }
    .stat-value { font-size: 22px; }
  }

  /* ============================================================ */
  /* Responsive: mobile */
  /* ============================================================ */
  @media (max-width: 768px) {
    /* Hide sidebar entirely on mobile */
    aside.sidebar { display: none; }
    main.main { padding: 16px 14px 90px; }

    /* Show bottom nav */
    .bottom-nav { display: flex; }

    /* Page header stacks */
    .page-header { margin-bottom: 18px; }
    .page-header > div:first-child { flex: 1; min-width: 0; }
    .page-title { font-size: 19px; }
    .page-sub { font-size: 12px; }

    /* Hide top-right "New Patient" button on mobile (it's in the bottom nav) */
    .page-header .btn-primary.hide-mobile { display: none; }

    /* Search + tabs go full width and stack */
    .filter-row { gap: 10px; }
    .search-wrap { max-width: none; width: 100%; }
    .tabs { width: 100%; justify-content: stretch; }
    .tabs .tab { flex: 1; }

    /* Patient table → card layout */
    .desk-only { display: none !important; }
    .mobile-only { display: block !important; }
    .patient-table { border: none !important; background: transparent !important; box-shadow: none !important; }
    .patient-table table, .patient-table thead, .patient-table tbody, .patient-table tr, .patient-table td {
      display: block; width: 100%;
    }
    .patient-table thead { display: none; }
    .patient-table tr {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      padding: 14px 16px;
    }
    .patient-table td { border: none; padding: 3px 0; }
    .patient-table td.cell-name { font-size: 15px; font-weight: 500; padding-bottom: 8px; }
    .patient-table td.cell-name a { color: var(--fg); }
    .patient-table td.cell-meta {
      display: flex !important; gap: 10px;
      font-size: 12px; color: var(--muted);
      flex-wrap: wrap;
    }
    .patient-table td.cell-meta .sep { opacity: 0.5; }
    .patient-table td.cell-status { padding-top: 8px; }

    /* Stats: keep 2x2 but tighter */
    .stats { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 18px; }
    .stat { padding: 14px; }
    .stat-label { font-size: 10px; }
    .stat-value { font-size: 22px; margin-top: 4px; }

    /* Patient detail */
    .patient-head { padding: 18px; }
    .patient-name { font-size: 19px; }
    .patient-meta { gap: 10px 18px; }
    .meta-item .lbl-text { font-size: 9px; }
    .meta-item .val { font-size: 12px; }
    .patient-actions { width: 100%; justify-content: stretch; }
    .patient-actions .btn { flex: 1; justify-content: center; }
    .patient-actions .hide-mobile { display: none; }

    .proc-grid { gap: 10px; margin-bottom: 14px; }
    .proc-card { padding: 16px; }
    .proc-count { font-size: 24px; }
    .section { padding: 18px; }
    .timeline { padding-left: 16px; }
    .timeline-dot { left: -22px; }

    /* Modal: full width, less padding */
    .modal { padding: 22px 18px; max-height: 92vh; }
    .modal-title { font-size: 16px; }
    .form-grid { grid-template-columns: 1fr; gap: 0; }

    /* Gallery: smaller thumbs */
    .gallery { grid-template-columns: repeat(3, 1fr); gap: 6px; }

    /* Back link */
    .back-link { margin-bottom: 14px; }

    /* Login screen */
    .login-card { padding: 26px 22px; }
  }

  @media (max-width: 380px) {
    .bnav-item span { font-size: 9px; }
    .bnav-item svg { width: 18px; height: 18px; }
    .bnav-item.primary .bnav-icon-wrap { width: 34px; height: 34px; }
  }
</style>
</head>

<div id="app"></div>

const $ = (sel) => document.querySelector(sel);
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ============================================================================
// Data loaders
// ============================================================================
async function loadDashboard() {
  state.loading = true;
  render();

  let query = db.from('patients').select('*').order('created_at', { ascending: false });
  if (state.searchQuery) query = query.ilike('name', `%${state.searchQuery}%`);
  if (state.filter === 'active') query = query.is('date_of_discharge', null);
  if (state.filter === 'discharged') query = query.not('date_of_discharge', 'is', null);

  const [patientsRes, totalRes, activeRes, hbotRes, npwtRes] = await Promise.all([
    query,
    db.from('patients').select('id', { count: 'exact', head: true }),
    db.from('patients').select('id', { count: 'exact', head: true }).is('date_of_discharge', null),
    db.from('hbot_sessions').select('id', { count: 'exact', head: true }),
    db.from('npwt_sessions').select('id', { count: 'exact', head: true })
  ]);

  if (patientsRes.error) {
    toast('Error loading patients: ' + patientsRes.error.message, true);
  }

  state.patients = patientsRes.data || [];
  state.stats = {
    total: totalRes.count || 0,
    active: activeRes.count || 0,
    hbot: hbotRes.count || 0,
    npwt: npwtRes.count || 0
  };
  state.loading = false;
  render();
}

async function loadPatient(id) {
  state.loading = true;
  state.patientId = id;
  render();

  const [patientRes, entriesRes, hbotRes, npwtRes, imagesRes] = await Promise.all([
    db.from('patients').select('*').eq('id', id).single(),
    db.from('patient_entries').select('*').eq('patient_id', id).order('date', { ascending: false }),
    db.from('hbot_sessions').select('*').eq('patient_id', id).order('date', { ascending: false }),
    db.from('npwt_sessions').select('*').eq('patient_id', id).order('date', { ascending: false }),
    db.from('images').select('*').eq('patient_id', id).order('created_at', { ascending: false })
  ]);

  if (patientRes.error) {
    toast('Patient not found', true);
    state.route = 'dashboard';
    state.loading = false;
    await loadDashboard();
    return;
  }

  state.patient = patientRes.data;
  state.entries = entriesRes.data || [];
  state.hbot = hbotRes.data || [];
  state.npwt = npwtRes.data || [];
  state.images = imagesRes.data || [];
  state.loading = false;
  render();
}

// ============================================================================
// Mutations
// ============================================================================
async function createPatient(form) {
  const { data, error } = await db.from('patients').insert({
    name: form.name.value,
    age: Number(form.age.value),
    sex: form.sex.value,
    date_of_admission: form.date_of_admission.value
  }).select('id').single();

  if (error) throw error;
  toast('Patient created');
  closeModal();
  state.route = 'patient';
  await loadPatient(data.id);
}

async function createEntry(form, files, imageLabel) {
  const { data: entry, error: entryErr } = await db.from('patient_entries').insert({
    patient_id: state.patientId,
    operator: form.operator.value,
    notes: form.notes.value,
    date: new Date(form.date.value).toISOString()
  }).select('id').single();

  if (entryErr) throw entryErr;

  // Upload each file to Storage, then save URL to images table
  for (const file of files) {
    const ext = file.name.split('.').pop() || 'jpg';
    const path = `${state.patientId}/${entry.id}/${crypto.randomUUID()}.${ext}`;

    const { error: upErr } = await db.storage
      .from('patient-images')
      .upload(path, file, { cacheControl: '3600', upsert: false });

    if (upErr) throw new Error('Image upload failed: ' + upErr.message);

    const { data: pub } = db.storage.from('patient-images').getPublicUrl(path);

    const { error: imgErr } = await db.from('images').insert({
      patient_id: state.patientId,
      entry_id: entry.id,
      image_url: pub.publicUrl,
      label: imageLabel || ''
    });
    if (imgErr) throw imgErr;
  }

  toast('Entry saved');
  closeModal();
  await loadPatient(state.patientId);
}

async function createProcedure(kind, date) {
  const table = kind === 'hbot' ? 'hbot_sessions' : 'npwt_sessions';
  const { error } = await db.from(table).insert({
    patient_id: state.patientId,
    date: date
  });
  if (error) throw error;
  toast(`${kind.toUpperCase()} session added`);
  closeModal();
  await loadPatient(state.patientId);
}

async function toggleDischarge() {
  const newValue = state.patient.date_of_discharge ? null : new Date().toISOString().slice(0, 10);
  const { error } = await db.from('patients')
    .update({ date_of_discharge: newValue })
    .eq('id', state.patientId);
  if (error) {
    toast(error.message, true);
    return;
  }
  toast(newValue ? 'Marked as discharged' : 'Marked as active');
  await loadPatient(state.patientId);
}

function openModal(title, bodyHtml, onSubmit) {
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="card modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title">${escapeHtml(title)}</h2>
        <button class="modal-close" onclick="closeModal()">${icons.close}</button>
      </div>
      ${bodyHtml}
    </div>
  `;
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
  document.body.appendChild(backdrop);
  document.body.style.overflow = 'hidden';

  const form = backdrop.querySelector('form');
  if (form && onSubmit) {
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = form.querySelector('button[type="submit"]');
      const errorEl = form.querySelector('.error-msg');
      if (errorEl) errorEl.textContent = '';
      if (submitBtn) { submitBtn.disabled = true; submitBtn.innerHTML = '<span class="spinner"></span> Saving...'; }
      try {
        await onSubmit(form);
      } catch (err) {
        if (errorEl) errorEl.textContent = err.message || 'Something went wrong';
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Save'; }
      }
    });
  }
}

function closeModal() {
  const m = document.getElementById('modal-backdrop');
  if (m) m.remove();
  document.body.style.overflow = '';
}

async function handleLogin(form, mode) {
  const email = form.email.value;
  const password = form.password.value;
  const { error } = mode === 'signin'
    ? await db.auth.signInWithPassword({ email, password })
    : await db.auth.signUp({ email, password });
  if (error) throw error;
  if (mode === 'signup') {
    toast('Account created. Check your email, then sign in.');
    return;
  }
  const { data: { user } } = await db.auth.getUser();
  currentUser = user;
  state.route = 'dashboard';
  render();
  await loadDashboard();
}

async function signOut() {
  await db.auth.signOut();
  currentUser = null;
  render();
}

      <div class="gallery">
        ${state.images.map(img => `
          <button class="gallery-item" onclick="openLightbox('${escapeHtml(img.image_url)}', '${escapeHtml(img.label)}')">
            <img src="${escapeHtml(img.image_url)}" alt="${escapeHtml(img.label)}" />
          </button>
        `).join('')}
      </div>
    </div>
  `;

  return `
    <div class="layout">
      ${renderSidebar()}
      <main class="main">
        <a class="back-link" href="#" onclick="event.preventDefault(); goDashboard()">
          ${icons.arrowLeft} Back to dashboard
        </a>

        <div class="card patient-head">
          <div class="patient-head-top">
            <div style="flex:1; min-width:0;">
              <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <h1 class="patient-name">${escapeHtml(p.name)}</h1>
                <span class="badge ${isActive ? 'badge-active' : ''}">
                  <span class="dot"></span>
                  ${isActive ? 'Active' : 'Discharged'}
                </span>
              </div>
              <div class="patient-meta">
                <div class="meta-item"><div class="lbl-text">Age</div><div class="val">${p.age}</div></div>
                <div class="meta-item"><div class="lbl-text">Sex</div><div class="val">${escapeHtml(p.sex)}</div></div>
                <div class="meta-item"><div class="lbl-text">Admitted</div><div class="val">${fmtDate(p.date_of_admission)}</div></div>
                <div class="meta-item"><div class="lbl-text">Discharged</div><div class="val">${fmtDate(p.date_of_discharge)}</div></div>
              </div>
            </div>
            <div class="patient-actions">
              <button class="btn btn-ghost btn-sm" onclick="toggleDischarge()">
                ${isActive ? 'Mark as discharged' : 'Mark as active'}
              </button>
              <button class="btn btn-primary" onclick="openAddEntryModal()">
                ${icons.plus} Add Entry
              </button>
            </div>
          </div>
        </div>

        <div class="proc-grid">
          <div class="card proc-card">
            <div class="proc-head">
              <div class="proc-title">${icons.activity} HBOT Sessions</div>
              <button class="btn btn-ghost btn-sm" onclick="openAddProcedureModal('hbot')">
                ${icons.plus} Add
              </button>
            </div>
            <div class="proc-count">${state.hbot.length}</div>
            ${state.hbot.length > 0 ? `<div class="proc-last">Last: ${fmtDate(state.hbot[0].date)}</div>` : ''}
          </div>
          <div class="card proc-card">
            <div class="proc-head">
              <div class="proc-title">${icons.droplet} NPWT Sessions</div>
              <button class="btn btn-ghost btn-sm" onclick="openAddProcedureModal('npwt')">
                ${icons.plus} Add
              </button>
            </div>
            <div class="proc-count">${state.npwt.length}</div>
            ${state.npwt.length > 0 ? `<div class="proc-last">Last: ${fmtDate(state.npwt[0].date)}</div>` : ''}
          </div>
        </div>

        <div class="card section">
          <h2 class="section-title">${icons.calendar} Timeline</h2>
          ${timelineHtml}
        </div>

        ${allImagesHtml}
      </main>
      ${renderBottomNav()}
    </div>
  `;
}

// ============================================================================
// Navigation
// ============================================================================
async function goDashboard() {
  state.route = 'dashboard';
  state.patientId = null;
  state.patient = null;
  render();
  await loadDashboard();
}

async function goPatient(id) {
  state.route = 'patient';
  await loadPatient(id);
}

var searchTimer;
function setFilter(f) {
  state.filter = f;
  loadDashboard();
}

// ============================================================================
// Render
// ============================================================================
function render() {
  const app = $('#app');

  if (!isConfigured()) {
    app.innerHTML = renderConfigWarning();
    return;
  }

  if (!currentUser) {
    app.innerHTML = renderLogin();
    const form = $('#login-form');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = form.querySelector('button[type="submit"]');
        const err = form.querySelector('.error-msg');
        err.textContent = '';
        btn.disabled = true;
        const origText = btn.textContent;
        btn.innerHTML = '<span class="spinner"></span> Please wait...';
        try {
          await handleLogin(form, loginMode);
        } catch (ex) {
          err.textContent = ex.message || 'Login failed';
          btn.disabled = false;
          btn.textContent = origText;
        }
      });
    }
    return;
  }

  if (state.route === 'patient') {
    app.innerHTML = renderPatient();
  } else {
    app.innerHTML = renderDashboard();
    // Wire search input with debounce
    const searchInput = $('#search-input');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        const val = e.target.value;
        searchTimer = setTimeout(() => {
          state.searchQuery = val;
          loadDashboard();
        }, 250);
      });
    }
  }
}

// ============================================================================
// Init
// ============================================================================
async function init() {
  if (!isConfigured()) {
    render();
    return;
  }

  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const { data: { session } } = await db.auth.getSession();
  if (session) {
    currentUser = session.user;
    render();
    await loadDashboard();
  } else {
    render();
  }

  db.auth.onAuthStateChange((_event, session) => {
    currentUser = session?.user || null;
    if (!currentUser) render();
  });
}

init();
</script>
</body>
</html>
